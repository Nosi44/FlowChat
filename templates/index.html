<!DOCTYPE html>
<html>
<head>
<title>Vision Stream</title>
<style>
body {
    font-family: Arial;
    background:#111;
    color:#eee;
    padding:20px;
}

#chat {
    max-width:700px;
    margin:auto;
    display:flex;
    flex-direction:column;
    height:90vh;
}

#controls {
    margin-bottom:10px;
}

#messages {
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column-reverse; /* новые сверху */
}

.msg {
    margin:6px 0;
    padding:10px;
    border-radius:10px;
}

.nova { background:#401515; border-left:4px solid red; }
.orion { background:#151540; border-left:4px solid cyan; }
.human { background:#333; }

button {
    margin:3px;
    padding:6px 10px;
    background:#222;
    color:#eee;
    border:1px solid #444;
    cursor:pointer;
    transition: all 0.2s ease;
}

button:hover {
    background:#333;
}

button.active {
    background:#0a84ff;
    border-color:#0a84ff;
}
</style>
</head>

<body>
<div id="chat">

<h2>Vision Stream</h2>

<!-- 1️⃣ КНОПКИ -->
<div id="controls">
    <b>Скорость:</b>
    <button data-group="speed" data-value="slow" onclick="setSpeed('slow'); setActive('speed','slow')">Медленно</button>
    <button data-group="speed" data-value="normal" onclick="setSpeed('normal'); setActive('speed','normal')" class="active">Нормально</button>
    <button data-group="speed" data-value="fast" onclick="setSpeed('fast'); setActive('speed','fast')">Быстро</button>

    <b>Длина:</b>
    <button data-group="length" data-value="short" onclick="setLength('short'); setActive('length','short')" class="active">Коротко</button>
    <button data-group="length" data-value="long" onclick="setLength('long'); setActive('length','long')">Длиннее</button>

    <button id="pauseBtn" onclick="togglePause()">Пауза</button>

    | Depth: <span id="depth">0</span>
</div>

<!-- 2️⃣ ПОЛЕ ВВОДА -->
<input id="text" placeholder="Напиши что-нибудь..." style="margin-bottom:8px;">
<button onclick="send()">Send</button>

<!-- 3️⃣ ЧАТ -->
<div id="messages"></div>

</div>

<script>

let paused = false;

function setActive(group, value) {
    const buttons = document.querySelectorAll(`button[data-group='${group}']`);
    buttons.forEach(btn => {
        btn.classList.remove("active");
        if (btn.dataset.value === value) {
            btn.classList.add("active");
        }
    });
}

async function loadMessages() {
    const res = await fetch("/messages");
    const data = await res.json();

    const container = document.getElementById("messages");
    container.innerHTML = "";

    data.messages.forEach(msg => {
        let cls = "human";
        if (msg.speaker === "Nova") cls = "nova";
        if (msg.speaker === "Orion") cls = "orion";

        container.innerHTML += `
            <div class="msg ${cls}">
                <b>${msg.speaker}</b>: ${msg.text}
            </div>
        `;
    });

    document.getElementById("depth").innerText = data.depth;
}

async function send() {
    const input = document.getElementById("text");

    await fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: input.value})
    });

    input.value = "";
    loadMessages();
}

async function setSpeed(s) {
    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({speed: s})
    });
}

async function setLength(l) {
    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({length: l})
    });
}

async function togglePause() {
    paused = !paused;

    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({paused: paused})
    });

    const btn = document.getElementById("pauseBtn");
    btn.textContent = paused ? "Продолжить" : "Пауза";
    btn.classList.toggle("active", paused);
}

document.getElementById("text").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

setInterval(loadMessages, 3000);
loadMessages();

</script>
</body>
</html>
