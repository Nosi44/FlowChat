<!DOCTYPE html>
<html>
<head>
<title>Vision Stream</title>
<style>
body {
    font-family: Arial;
    background:#111;
    color:#eee;
    padding:20px;
}

#chat {
    max-width:700px;
    margin:auto;
}

.msg {
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

.nova {
    background:#401515;
    border-left:4px solid red;
}

.orion {
    background:#151540;
    border-left:4px solid cyan;
}

.human {
    background:#333;
}

#topbar {
    margin-bottom:15px;
}

button {
    margin:3px;
}
</style>
</head>

<body>
<div id="chat">

<h2>Vision Stream</h2>

<div id="topbar">
    <div>
        <b>Скорость:</b>
        <button onclick="setSpeed('slow')">Медленно</button>
        <button onclick="setSpeed('normal')">Нормально</button>
        <button onclick="setSpeed('fast')">Быстро</button>
    </div>

    <div>
        <b>Длина:</b>
        <button onclick="setLength('short')">Коротко</button>
        <button onclick="setLength('long')">Длиннее</button>
    </div>

    <div>
        Depth: <span id="depth">0</span> |
        Speed: <span id="speed">normal</span> |
        Length: <span id="length">short</span>
    </div>
</div>

<div id="messages"></div>

<input id="text" placeholder="Напиши что-нибудь..." style="width:80%">
<button onclick="send()">Send</button>

</div>

<script>
async function loadMessages() {
    const res = await fetch("/messages");
    const data = await res.json();

    const container = document.getElementById("messages");
    container.innerHTML = "";

    data.messages.slice().reverse().forEach(msg => {
        let cls = "human";
        if (msg.speaker.includes("Nova")) cls = "nova";
        if (msg.speaker.includes("Orion")) cls = "orion";

        container.innerHTML += `
            <div class="msg ${cls}">
                <b>${msg.speaker}</b>: ${msg.text}
            </div>
        `;
    });

    document.getElementById("depth").innerText = data.depth;
    document.getElementById("speed").innerText = data.speed;
    document.getElementById("length").innerText = data.length;
}

async function send() {
    const input = document.getElementById("text");

    await fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: input.value})
    });

    input.value = "";
    loadMessages();
}

async function setSpeed(s) {
    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({speed: s})
    });
}

async function setLength(l) {
    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({length: l})
    });
}

document.getElementById("text").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

setInterval(loadMessages, 3000);
loadMessages();
</script>

</body>
</html>
