<!DOCTYPE html>
<html>
<head>
<title>Vision Stream</title>
<style>
body {
    font-family: Arial;
    background:#111;
    color:#eee;
    padding:20px;
}

#chat {
    max-width:700px;
    margin:auto;
    display:flex;
    flex-direction:column-reverse;
    height:90vh;
}

#controls {
    margin-bottom:10px;
}

#messages {
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.msg {
    margin:6px 0;
    padding:10px;
    border-radius:10px;
}

.nova { background:#401515; border-left:4px solid red; }
.orion { background:#151540; border-left:4px solid cyan; }
.human { background:#333; }

button { margin:3px; }
</style>
</head>

<body>
<div id="chat">

<h2>Vision Stream</h2>

<div id="controls">
    <b>Скорость:</b>
    <button onclick="setSpeed('slow')">Медленно</button>
    <button onclick="setSpeed('normal')">Нормально</button>
    <button onclick="setSpeed('fast')">Быстро</button>

    <b>Длина:</b>
    <button onclick="setLength('short')">Коротко</button>
    <button onclick="setLength('long')">Длиннее</button>

    <button onclick="togglePause()">Пауза</button>

    | Depth: <span id="depth">0</span>
</div>

<input id="text" placeholder="Напиши что-нибудь..." style="margin-bottom:8px;">
<button onclick="send()">Send</button>

<div id="messages"></div>

</div>

<script>

let paused = false;

async function loadMessages() {
    const res = await fetch("/messages");
    const data = await res.json();

    const container = document.getElementById("messages");
    container.innerHTML = "";

    data.messages.forEach(msg => {
        let cls = "human";
        if (msg.speaker === "Nova") cls = "nova";
        if (msg.speaker === "Orion") cls = "orion";

        container.innerHTML += `
            <div class="msg ${cls}">
                <b>${msg.speaker}</b>: ${msg.text}
            </div>
        `;
    });

    document.getElementById("depth").innerText = data.depth;

}

async function send() {
    const input = document.getElementById("text");

    await fetch("/send", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: input.value})
    });

    input.value = "";
    loadMessages();
}

async function setSpeed(s) {
    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({speed: s})
    });
}

async function setLength(l) {
    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({length: l})
    });
}

async function togglePause() {
    paused = !paused;

    await fetch("/settings", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({paused: paused})
    });
}

document.getElementById("text").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

setInterval(loadMessages, 3000);
loadMessages();

</script>
</body>
</html>
